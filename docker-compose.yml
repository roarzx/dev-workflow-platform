services:
  postgres:
    image: postgres:16-alpine
    container_name: dwf-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-devwf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devwf_secret}
      POSTGRES_DB: ${POSTGRES_DB:-dev_workflow}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devwf"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dwf-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dwf-backend
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-devwf}:${POSTGRES_PASSWORD:-devwf_secret}@postgres:5432/${POSTGRES_DB:-dev_workflow}
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - repo_data:/data/repos
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dwf-worker
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-devwf}:${POSTGRES_PASSWORD:-devwf_secret}@postgres:5432/${POSTGRES_DB:-dev_workflow}
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
      - repo_data:/data/repos
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: rq worker --url redis://redis:6379/0 dev-workflow-queue

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dwf-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  repo_data:
